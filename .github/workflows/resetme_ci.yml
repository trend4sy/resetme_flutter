name: ResetMe CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.2'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # ⚠️ معطل مؤقتًا حتى يتم ترقية مجلد android/ محليًا
    # لإصلاحه: نفّذ محليًا `flutter create -t app . --platforms=android --force` ثم احذف هذا السطر
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Debug)
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resetme-android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-android-release:
    name: Build Android APK (Release)
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # ⚠️ معطل مؤقتًا لنفس سبب البناء التجريبي
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: |
          flutter build apk --release \
            --obfuscate --split-debug-info=obfuscate/ \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: resetme-android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-web:
    name: Build Web (Flutter)
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable web platform
        run: flutter config --enable-web

      - name: Build Web (Release)
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: resetme-web
          path: build/web/
          retention-days: 7

  deploy-preview:
    name: Deploy Web Preview
    needs: build-web
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: resetme-web
          path: build/web

      - name: Deploy to Cloudflare Pages (مثال)
        uses: cloudflare/pages-action@v1
        if: false  # فعّل هذا بعد إعداد Cloudflare
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: resetme-preview
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

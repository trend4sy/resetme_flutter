name: resetme
description: مساعدك اليومي للتوتر والنوم
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.0
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Remote
  supabase_flutter: ^2.5.3
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  # Audio
  audioplayers: ^6.0.0
  # Notifications
  firebase_core: ^2.31.1
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.2
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  # Subscription
  purchases_flutter: ^8.11.0
  # Utilities
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.3
  share_plus: ^9.0.0
  # Security
  flutter_secure_storage: ^9.2.2
  # AI
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/

  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
